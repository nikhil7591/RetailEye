services:
  # ── Backend (FastAPI + YOLO) ──────────────────────────────
  - type: web
    name: retaileye-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 10000
    plan: starter  # $7/mo — 512MB RAM, needed for YOLO models
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (Neon DB URL)
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false  # Set to your frontend URL after deploy
    healthCheckPath: /health
